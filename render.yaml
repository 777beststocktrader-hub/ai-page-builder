services:
  - type: web
    name: ai-page-builder
    runtime: node
    region: oregon
    plan: free
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && npm install && npm run build"
    startCommand: "node backend/dist/index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
